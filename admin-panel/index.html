<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin | Brian Ivie Hair</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fdfdfb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.page{min-height:100vh;display:flex;flex-direction:column}
.login-page{align-items:center;justify-content:center}
.login-box{width:100%;max-width:360px;padding:2rem;border-radius:12px;border:1px solid rgba(197,160,89,0.15);background:rgba(253,253,251,0.02)}
h1{font-family:Georgia,'Times New Roman',serif;font-size:1.5rem;margin-bottom:1.5rem;text-align:center;color:#fdfdfb}
h2{font-family:Georgia,'Times New Roman',serif;font-size:1.25rem;color:#fdfdfb}
input,textarea{width:100%;padding:0.65rem 1rem;border-radius:8px;border:1px solid rgba(197,160,89,0.15);background:rgba(253,253,251,0.04);color:#fdfdfb;font-size:0.875rem;font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:#c5a059}
textarea{resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:0.6rem 1.25rem;border-radius:8px;border:none;font-size:0.875rem;font-family:inherit;cursor:pointer;transition:opacity 0.2s;text-decoration:none}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#c5a059;color:#0a0a0a}
.btn-ghost{background:transparent;border:1px solid rgba(197,160,89,0.3);color:rgba(253,253,251,0.6)}
.btn-ghost:hover{border-color:rgba(197,160,89,0.5)}
.btn-sm{padding:0.4rem 0.85rem;font-size:0.8rem}
.w-full{width:100%}
.text-center{text-align:center}
.text-xs{font-size:0.75rem}
.text-sm{font-size:0.875rem}
.text-gold{color:#c5a059}
.text-muted{color:rgba(253,253,251,0.35)}
.text-error{color:rgba(200,80,80,0.9)}
.text-success{color:#4ade80}
.error{color:rgba(200,80,80,0.9);font-size:0.75rem;margin-bottom:0.75rem}
.mb-2{margin-bottom:0.5rem}
.mb-3{margin-bottom:0.75rem}
.mb-4{margin-bottom:1rem}
.mb-6{margin-bottom:1.5rem}
.mb-10{margin-bottom:2.5rem}
.mt-1{margin-top:0.25rem}
.mt-2{margin-top:0.5rem}
.gap-2{gap:0.5rem}
.gap-3{gap:0.75rem}
.gap-4{gap:1rem}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}
.justify-end{justify-content:flex-end}
.shrink-0{flex-shrink:0}
.min-w-0{min-width:0}
.flex-1{flex:1}
.grid{display:grid}
.grid-cols-1{grid-template-columns:repeat(1,1fr)}
.grid-cols-3{grid-template-columns:repeat(3,1fr)}
.whitespace-pre-wrap{white-space:pre-wrap}
.leading-relaxed{line-height:1.625}
.max-w-6xl{max-width:72rem}
.mx-auto{margin-left:auto;margin-right:auto}
.px-6{padding-left:1.5rem;padding-right:1.5rem}
.py-10{padding-top:2.5rem;padding-bottom:2.5rem}
.pt-32{padding-top:8rem}
.pb-20{padding-bottom:5rem}
.p-4{padding:1rem}
.p-5{padding:1.25rem}
.p-6{padding:1.5rem}
.rounded-xl{border-radius:12px}
.rounded-lg{border-radius:8px}
.border{border:1px solid rgba(197,160,89,0.08)}
.space-y-3>*+*{margin-top:0.75rem}
.hidden{display:none}
.uppercase{text-transform:uppercase}
.tracking-wider{letter-spacing:0.05em}
.cursor-pointer{cursor:pointer}
.overflow-y-auto{overflow-y:auto}
.max-h-32{max-height:8rem}
.fixed{position:fixed}
.inset-0{inset:0}
.z-50{z-index:50}
.bg-overlay{background:rgba(0,0,0,0.7)}
.max-w-lg{max-width:32rem}
.stat-card{border-radius:12px;padding:1.25rem;border:1px solid rgba(197,160,89,0.1);background:rgba(197,160,89,0.05)}
.stat-number{font-size:1.875rem;font-family:Georgia,'Times New Roman',serif;color:#c5a059}
.stat-label{font-size:0.75rem;color:rgba(253,253,251,0.4);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.25rem}
.msg-card{border-radius:12px;padding:1.25rem;border:1px solid rgba(197,160,89,0.08);background:rgba(253,253,251,0.02)}
.msg-name{font-size:0.875rem;font-weight:500;color:#fdfdfb}
.msg-email{font-size:0.75rem;color:rgba(253,253,251,0.35);margin-left:0.75rem}
.msg-service{font-size:0.75rem;color:#c5a059;margin-bottom:0.25rem}
.msg-body{font-size:0.875rem;color:rgba(253,253,251,0.5);line-height:1.625;white-space:pre-wrap}
.msg-date{font-size:0.625rem;color:rgba(253,253,251,0.3);white-space:nowrap}
.badge{display:inline-block;margin-top:0.5rem;padding:0.125rem 0.5rem;border-radius:4px;font-size:0.625rem;text-transform:uppercase;letter-spacing:0.05em}
.badge-inquiry{color:#fbbf24;background:rgba(251,191,36,0.1)}
.badge-booking{color:#34d399;background:rgba(52,211,153,0.1)}
.badge-contact{color:#93c5fd;background:rgba(147,197,253,0.1)}
.modal-box{border-radius:12px;border:1px solid rgba(197,160,89,0.15);background:#111;padding:1.5rem;width:100%;max-width:36rem}
.modal-msg{border-radius:8px;padding:0.75rem;background:rgba(253,253,251,0.03);color:rgba(253,253,251,0.4);font-size:0.875rem;max-height:8rem;overflow-y:auto}
.header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem}
.header-bar h1{margin-bottom:0}
@media(max-width:768px){.grid-cols-3{grid-template-columns:1fr}.msg-email,.msg-phone{display:block;margin-left:0}}
</style>
</head>
<body>
<div id="login-page" class="page login-page">
  <div class="login-box">
    <h1>Admin</h1>
    <form id="login-form">
      <input type="password" id="password-input" placeholder="Password" class="mb-4" autofocus>
      <div id="login-error" class="error hidden"></div>
      <button type="submit" id="login-btn" class="btn btn-primary w-full">Sign In</button>
    </form>
  </div>
</div>

<div id="dashboard-page" class="page hidden">
  <main style="min-height:100vh;background:#0a0a0a">
    <div class="max-w-6xl mx-auto px-6 pt-32 pb-20">
      <div class="header-bar">
        <h1 class="mb-0">Inbox</h1>
        <div class="flex gap-3">
          <button id="refresh-btn" class="btn btn-ghost btn-sm">Refresh</button>
          <button id="logout-btn" class="btn btn-ghost btn-sm">Sign Out</button>
        </div>
      </div>
      <div id="loading" class="text-center py-10 text-muted hidden">Loading...</div>
      <div id="error-msg" class="text-xs mb-4 text-error hidden"></div>
      <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 hidden"></div>
      <div id="messages" class="space-y-3"></div>
      <div id="empty-msg" class="text-center py-10 text-muted hidden">No messages yet</div>
    </div>
  </main>
</div>

<div id="reply-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-overlay">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg">Reply to <span id="reply-name"></span></h2>
      <button id="close-reply" class="text-sm text-muted cursor-pointer" style="background:none;border:none">Close</button>
    </div>
    <p class="text-xs mb-1 text-muted">To: <span id="reply-to"></span></p>
    <p id="reply-service" class="text-xs mb-3 text-gold hidden"></p>
    <div id="reply-original" class="modal-msg mb-4"></div>
    <textarea id="reply-text" placeholder="Type your reply..." rows="6" class="mb-3"></textarea>
    <div id="reply-status" class="text-xs mb-3 hidden"></div>
    <div class="flex gap-3 justify-end">
      <button id="cancel-reply" class="btn btn-ghost btn-sm">Cancel</button>
      <button id="send-reply" class="btn btn-primary btn-sm">Send Reply</button>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'admin_token'
const API_BASE = '/api/admin'

let token = sessionStorage.getItem(TOKEN_KEY)
let currentReply = null

const $ = (id) => document.getElementById(id)
const show = (el) => el.classList.remove('hidden')
const hide = (el) => el.classList.add('hidden')

if (token) showDashboard()

$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const password = $('password-input').value
  const btn = $('login-btn')
  const errEl = $('login-error')
  hide(errEl)
  btn.disabled = true
  btn.textContent = 'Signing in...'
  try {
    const res = await fetch(API_BASE + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    })
    const json = await res.json()
    if (res.ok && json.token) {
      token = json.token
      sessionStorage.setItem(TOKEN_KEY, token)
      showDashboard()
    } else {
      errEl.textContent = json.message || 'Invalid password'
      show(errEl)
    }
  } catch {
    errEl.textContent = 'Login failed'
    show(errEl)
  }
  btn.disabled = false
  btn.textContent = 'Sign In'
})

$('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem(TOKEN_KEY)
  token = null
  hide($('dashboard-page'))
  show($('login-page'))
  $('password-input').value = ''
})

$('refresh-btn').addEventListener('click', fetchData)

$('close-reply').addEventListener('click', closeReply)
$('cancel-reply').addEventListener('click', closeReply)

$('send-reply').addEventListener('click', sendReply)

function closeReply() {
  hide($('reply-modal'))
  currentReply = null
  $('reply-text').value = ''
}

function showDashboard() {
  hide($('login-page'))
  show($('dashboard-page'))
  fetchData()
}

async function fetchData() {
  const loading = $('loading')
  const errorEl = $('error-msg')
  show(loading)
  hide(errorEl)
  $('messages').innerHTML = ''
  try {
    const res = await fetch(API_BASE + '/inquiries', {
      headers: { Authorization: `Bearer ${token}` },
    })
    const json = await res.json()
    if (res.ok) {
      renderDashboard(json)
    } else {
      sessionStorage.removeItem(TOKEN_KEY)
      token = null
      hide($('dashboard-page'))
      show($('login-page'))
      errorEl.textContent = 'Session expired'
      show(errorEl)
    }
  } catch {
    errorEl.textContent = 'Failed to load data'
    show(errorEl)
  }
  hide(loading)
}

function renderDashboard(data) {
  const statsEl = $('stats')
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-number">${data.inquiries||0}</div><div class="stat-label">Inquiries</div></div>
    <div class="stat-card"><div class="stat-number">${data.bookings||0}</div><div class="stat-label">Bookings</div></div>
    <div class="stat-card"><div class="stat-number">${data.contacts||0}</div><div class="stat-label">Contact</div></div>
  `
  show(statsEl)

  const msgsEl = $('messages')
  const emptyEl = $('empty-msg')

  if (data.messages && data.messages.length > 0) {
    hide(emptyEl)
    msgsEl.innerHTML = data.messages.map((m, i) => renderMessage(m, i)).join('')
  } else {
    show(emptyEl)
    msgsEl.innerHTML = ''
  }
}

function renderMessage(m, i) {
  const badgeClass = m.type === 'inquiry' ? 'badge-inquiry' : m.type === 'booking' ? 'badge-booking' : 'badge-contact'
  const date = formatDate(m.createdAt)
  return `
    <div class="msg-card">
      <div class="flex items-start justify-between gap-4 mb-2">
        <div class="min-w-0 flex-1">
          <span class="msg-name">${esc(m.name)}</span>
          <span class="msg-email">${esc(m.email)}</span>
          ${m.phone ? `<span class="text-xs text-muted ml-3">${esc(m.phone)}</span>` : ''}
        </div>
        <div class="flex items-center gap-3 shrink-0">
          ${m.email ? `<button onclick="openReply('${i}')" class="btn btn-primary btn-sm">Reply</button>` : ''}
          <span class="msg-date">${date}</span>
        </div>
      </div>
      ${m.service ? `<div class="msg-service">${esc(m.service)}</div>` : ''}
      <div class="msg-body">${esc(m.message)}</div>
      <span class="badge ${badgeClass}">${m.type || 'contact'}</span>
    </div>
  `
}

function esc(s) {
  if (!s) return ''
  const d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

let messagesData = []
function openReply(idx) {
  const msgs = messagesData
  const m = msgs[parseInt(idx)]
  if (!m) return
  currentReply = m
  $('reply-name').textContent = m.name
  $('reply-to').textContent = m.email
  if (m.service) {
    $('reply-service').textContent = 'Re: ' + m.service
    show($('reply-service'))
  } else {
    hide($('reply-service'))
  }
  $('reply-original').textContent = m.message
  $('reply-text').value = ''
  hide($('reply-status'))
  show($('reply-modal'))
}

async function sendReply() {
  const m = currentReply
  const text = $('reply-text').value.trim()
  if (!m || !text) return
  const btn = $('send-reply')
  const status = $('reply-status')
  btn.disabled = true
  btn.textContent = 'Sending...'
  hide(status)
  try {
    const res = await fetch(API_BASE + '/reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ messageId: m.id, to: m.email, subject: m.subject, replyText: text }),
    })
    const json = await res.json()
    if (res.ok) {
      status.textContent = 'Reply sent'
      status.className = 'text-xs mb-3 text-success'
      show(status)
      $('reply-text').value = ''
      setTimeout(() => { closeReply() }, 1500)
    } else {
      status.textContent = json.message || 'Failed'
      status.className = 'text-xs mb-3 text-error'
      show(status)
    }
  } catch {
    status.textContent = 'Network error'
    status.className = 'text-xs mb-3 text-error'
    show(status)
  }
  btn.disabled = false
  btn.textContent = 'Send Reply'
}

function formatDate(d) {
  const dt = new Date(d)
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })
}

// Store messages data on fetch for reply lookup
const origFetch = fetchData
fetchData = async function() {
  const loading = $('loading')
  const errorEl = $('error-msg')
  show(loading)
  hide(errorEl)
  $('messages').innerHTML = ''
  try {
    const res = await fetch(API_BASE + '/inquiries', {
      headers: { Authorization: `Bearer ${token}` },
    })
    const json = await res.json()
    if (res.ok) {
      messagesData = json.messages || []
      renderDashboard(json)
    } else {
      sessionStorage.removeItem(TOKEN_KEY)
      token = null
      hide($('dashboard-page'))
      show($('login-page'))
    }
  } catch {
    errorEl.textContent = 'Failed to load data'
    show(errorEl)
  }
  hide(loading)
}
</script>
</body>
</html>
